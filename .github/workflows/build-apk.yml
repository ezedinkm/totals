name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Patch another_telephony build.gradle
        run: |
          find $HOME/.pub-cache -name "build.gradle" -path "*another_telephony*" | while read f; do
            echo "Patching: $f"
            # Fix compileSdk
            sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 37/g' "$f"
            # Fix Kotlin jvmTarget
            sed -i "s/jvmTarget = '[^']*'/jvmTarget = '17'/g" "$f"
            # Fix Java sourceCompatibility / targetCompatibility
            sed -i 's/sourceCompatibility JavaVersion\.[A-Z_0-9]*/sourceCompatibility JavaVersion.VERSION_17/g' "$f"
            sed -i 's/targetCompatibility JavaVersion\.[A-Z_0-9]*/targetCompatibility JavaVersion.VERSION_17/g' "$f"
            echo "--- After patching ---"
            grep -E "compileSdk|jvmTarget|Compatibility" "$f" || true
          done

      - name: Build release APK
        working-directory: app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
